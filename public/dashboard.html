<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agentra MailSense – Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;font-size:16px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root,[data-theme="dark"]{
  --bg:#07090f;--surface:#0d1117;--surface2:#131a26;--surface3:#1a2235;
  --border:rgba(99,130,255,0.12);--border2:rgba(99,130,255,0.22);
  --accent:#4f6ef7;--accent2:#6b88ff;--teal:#2dd4bf;--teal2:#5eead4;
  --amber:#f59e0b;--red:#f87171;--green:#34d399;
  --text:#e2e8f8;--text-muted:#7a85a8;--text-dim:#3a4260;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
}
[data-theme="light"]{
  --bg:#f0f4ff;--surface:#ffffff;--surface2:#f5f7ff;--surface3:#eef1fb;
  --border:rgba(79,110,247,0.15);--border2:rgba(79,110,247,0.3);
  --accent:#4f6ef7;--accent2:#3d5ce0;--teal:#0d9488;--teal2:#14b8a6;
  --amber:#d97706;--red:#dc2626;--green:#059669;
  --text:#1a2240;--text-muted:#5a6690;--text-dim:#9aa3c2;
  --shadow:0 4px 20px rgba(79,110,247,0.08);
}
html,body,#root{height:100%;width:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);transition:background 0.3s,color 0.3s;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* ONBOARDING */
.onboarding{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;}
.onboarding-card{width:100%;max-width:600px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;box-shadow:var(--shadow);animation:slideUp 0.5s cubic-bezier(0.22,1,0.36,1);}
@keyframes slideUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.ob-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.ob-logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--teal));border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(79,110,247,0.4);}
.ob-logo-icon svg{width:22px;height:22px;}
.ob-brand{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--text);}
.ob-sub{font-size:0.68rem;font-weight:600;color:var(--teal);letter-spacing:0.12em;text-transform:uppercase;}
.onboarding h1{font-family:'DM Serif Display',serif;font-size:1.8rem;color:var(--text);margin-bottom:10px;line-height:1.2;}
.onboarding h1 em{font-style:italic;background:linear-gradient(90deg,var(--accent2),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ob-desc{font-size:0.86rem;color:var(--text-muted);margin-bottom:28px;line-height:1.6;}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px;}
.mode-card{border:2px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:all 0.2s;background:var(--surface2);position:relative;}
.mode-card:hover{border-color:var(--border2);}
.mode-card.sel-fast{border-color:var(--amber);background:rgba(245,158,11,0.06);}
.mode-card.sel-safe{border-color:var(--teal);background:rgba(45,212,191,0.06);}
.mc-icon{font-size:2rem;margin-bottom:12px;}
.mc-title{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:6px;}
.mc-desc{font-size:0.79rem;color:var(--text-muted);line-height:1.5;}
.mc-check{position:absolute;top:12px;right:12px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;}
.mode-card.sel-fast .mc-check{opacity:1;background:var(--amber);}
.mode-card.sel-safe .mc-check{opacity:1;background:var(--teal);}
.ob-btn{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),#3d5ce0);color:white;font-family:inherit;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(79,110,247,0.35);}
.ob-btn:hover{box-shadow:0 6px 28px rgba(79,110,247,0.5);transform:translateY(-1px);}
.ob-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

/* LAYOUT */
.layout{display:flex;height:100vh;width:100vw;overflow:hidden;position:relative;}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:40;backdrop-filter:blur(2px);}
.sb-overlay.active{display:block;}

/* SIDEBAR */
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50;transition:width 0.3s,min-width 0.3s,transform 0.3s;overflow:hidden;}
.sidebar.collapsed{width:56px;min-width:56px;}
.sb-logo{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;min-height:56px;}
.logo-icon{width:28px;height:28px;min-width:28px;background:linear-gradient(135deg,var(--accent),var(--teal));border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(79,110,247,0.35);}
.logo-icon svg{width:14px;height:14px;}
.logo-text{display:flex;flex-direction:column;line-height:1.1;overflow:hidden;white-space:nowrap;transition:opacity 0.2s,width 0.3s;width:160px;}
.logo-brand{font-family:'DM Serif Display',serif;font-size:0.95rem;color:var(--text);}
.logo-sub{font-size:0.58rem;font-weight:600;color:var(--teal);letter-spacing:0.1em;text-transform:uppercase;}
.sidebar.collapsed .logo-text{opacity:0;width:0;}
.sb-close{display:none;margin-left:auto;background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;flex-shrink:0;}
.sb-nav{flex:1;padding:8px;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:2px;}
.sb-sec{font-size:0.6rem;font-weight:600;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;padding:10px 8px 4px;white-space:nowrap;transition:opacity 0.2s;}
.sidebar.collapsed .sb-sec{opacity:0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:0.82rem;font-weight:400;color:var(--text-muted);cursor:pointer;transition:all 0.18s;border:none;background:none;width:100%;text-align:left;position:relative;white-space:nowrap;overflow:hidden;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:linear-gradient(135deg,rgba(79,110,247,0.18),rgba(45,212,191,0.08));color:var(--text);font-weight:500;}
.nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;background:linear-gradient(var(--accent),var(--teal));border-radius:2px;}
.nav-item svg{width:15px;height:15px;flex-shrink:0;}
.ni-label{transition:opacity 0.2s,width 0.3s;overflow:hidden;}
.sidebar.collapsed .ni-label{opacity:0;width:0;}
.nav-badge{margin-left:auto;background:var(--accent);color:white;font-size:0.62rem;font-weight:600;padding:1px 6px;border-radius:20px;transition:opacity 0.2s;flex-shrink:0;}
.nav-badge.red{background:var(--red);}
.nav-badge.amber{background:var(--amber);}
.sidebar.collapsed .nav-badge{opacity:0;}

/* NOTIFICATION NAV ITEM - special styling */
.nav-item.notif-item{background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.15);color:var(--red);}
.nav-item.notif-item:hover{background:rgba(248,113,113,0.12);color:var(--red);}
.nav-item.notif-item.active{background:rgba(248,113,113,0.15);color:var(--red);}
.nav-item.notif-item.active::before{background:var(--red);}
.notif-count{margin-left:auto;background:var(--red);color:white;font-size:0.62rem;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0;animation:notif-pulse 2s infinite;transition:opacity 0.2s;}
@keyframes notif-pulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,0.4);}50%{box-shadow:0 0 0 4px rgba(248,113,113,0);}}
.sidebar.collapsed .notif-count{opacity:0;}

/* MODE TOGGLE */
.mode-tgl{margin:8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;overflow:hidden;}
.mode-lbl{font-size:0.62rem;font-weight:600;color:var(--text-dim);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;white-space:nowrap;transition:opacity 0.2s,height 0.3s;}
.sidebar.collapsed .mode-lbl{opacity:0;height:0;margin:0;}
.mode-btns{display:flex;gap:6px;}
.sidebar.collapsed .mode-btns{flex-direction:column;gap:4px;}
.mbtn{flex:1;padding:7px 4px;border:none;border-radius:7px;font-family:inherit;font-size:0.72rem;font-weight:500;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:4px;}
.mbtn-lbl{transition:opacity 0.2s,width 0.3s;}
.sidebar.collapsed .mbtn-lbl{opacity:0;width:0;overflow:hidden;}
.mbtn.fast{background:rgba(245,158,11,0.12);color:var(--amber);border:1px solid rgba(245,158,11,0.2);}
.mbtn.fast.active{background:var(--amber);color:#000;}
.mbtn.safe{background:rgba(45,212,191,0.08);color:var(--teal);border:1px solid rgba(45,212,191,0.18);}
.mbtn.safe.active{background:var(--teal);color:#000;}

/* SIDEBAR BOTTOM */
.sb-bottom{padding:8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px;}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;overflow:hidden;}
.u-avatar{width:30px;height:30px;min-width:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--teal));display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:600;color:white;flex-shrink:0;}
.u-info{flex:1;min-width:0;overflow:hidden;transition:opacity 0.2s,width 0.3s;}
.sidebar.collapsed .u-info{opacity:0;width:0;}
.u-name{font-size:0.78rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.u-role{font-size:0.62rem;color:var(--text-muted);}
.logout-btn{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:0.82rem;color:var(--red);cursor:pointer;transition:all 0.18s;border:none;background:none;width:100%;text-align:left;white-space:nowrap;overflow:hidden;}
.logout-btn:hover{background:rgba(248,113,113,0.1);}
.logout-btn svg{width:15px;height:15px;flex-shrink:0;}
.lo-lbl{transition:opacity 0.2s,width 0.3s;}
.sidebar.collapsed .lo-lbl{opacity:0;width:0;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* TOPBAR */
.topbar{height:56px;min-height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px;}
.collapse-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text-muted);cursor:pointer;padding:6px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;}
.collapse-btn:hover{background:var(--surface2);color:var(--accent);border-color:var(--accent);}
.hamburger{display:none;background:none;border:none;color:var(--text-muted);cursor:pointer;padding:6px;border-radius:8px;flex-shrink:0;}
.topbar-title{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-title span{font-style:italic;background:linear-gradient(90deg,var(--accent2),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.status-pill{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:20px;font-size:0.7rem;font-weight:500;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25);color:var(--green);white-space:nowrap;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.mode-pill{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:0.7rem;font-weight:600;white-space:nowrap;}
.mode-pill.fast{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);color:var(--amber);}
.mode-pill.safe{background:rgba(45,212,191,0.1);border:1px solid rgba(45,212,191,0.25);color:var(--teal);}

/* THEME TOGGLE BUTTON - prominent */
.theme-toggle-btn{
  display:flex;align-items:center;gap:7px;
  padding:6px 12px;border-radius:20px;
  border:1.5px solid var(--border2);
  background:var(--surface2);
  color:var(--text-muted);
  cursor:pointer;transition:all 0.2s;
  font-family:inherit;font-size:0.75rem;font-weight:500;
  flex-shrink:0;
}
.theme-toggle-btn:hover{background:var(--surface3);border-color:var(--accent);color:var(--accent);}
.theme-toggle-btn svg{width:14px;height:14px;flex-shrink:0;}
.theme-toggle-btn .theme-label{white-space:nowrap;}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:14px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden;transition:border-color 0.2s,transform 0.2s;}
.stat-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.blue::before{background:linear-gradient(90deg,var(--accent),var(--accent2));}
.stat-card.teal::before{background:linear-gradient(90deg,var(--teal),var(--teal2));}
.stat-card.amber::before{background:var(--amber);}
.stat-card.red::before{background:var(--red);}
.stat-card.green::before{background:var(--green);}
.stat-label{font-size:0.7rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.stat-value{font-family:'DM Serif Display',serif;font-size:1.8rem;color:var(--text);line-height:1;}
.stat-sub{font-size:0.7rem;color:var(--text-muted);margin-top:5px;}
.stat-icon{position:absolute;right:14px;top:14px;opacity:0.07;}
.stat-icon svg{width:36px;height:36px;}

/* PANELS */
.two-col{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:12px;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.panel-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.panel-title{font-size:0.82rem;font-weight:600;color:var(--text);flex:1;}
.panel-badge{font-size:0.65rem;font-weight:500;padding:2px 8px;border-radius:10px;background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}

/* MODE BANNER */
.mode-banner{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;margin-bottom:14px;font-size:0.82rem;}
.mode-banner.fast{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);color:var(--amber);}
.mode-banner.safe{background:rgba(45,212,191,0.06);border:1px solid rgba(45,212,191,0.18);color:var(--teal);}
.mode-banner strong{font-weight:600;}
.mode-banner p{color:var(--text-muted);font-size:0.77rem;margin-top:2px;}

/* DRAFTS */
.draft-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;}
.draft-to{font-size:0.78rem;font-weight:500;color:var(--text);}
.draft-preview{font-size:0.73rem;color:var(--text-muted);margin-top:3px;line-height:1.4;}
.draft-actions{display:flex;gap:6px;margin-top:10px;}
.draft-send{padding:5px 12px;border-radius:6px;border:none;background:var(--teal);color:white;font-family:inherit;font-size:0.73rem;font-weight:500;cursor:pointer;}
.draft-discard{padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:none;color:var(--text-muted);font-family:inherit;font-size:0.73rem;cursor:pointer;}

/* EMAILS */
.email-list{max-height:320px;overflow-y:auto;}
.email-item{display:flex;align-items:flex-start;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;}
.email-item:last-child{border-bottom:none;}
.email-item:hover{background:var(--surface2);}
.email-item input[type=checkbox]{margin-top:2px;flex-shrink:0;accent-color:var(--accent);width:13px;height:13px;}
.e-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.67rem;font-weight:600;flex-shrink:0;color:white;}
.e-body{flex:1;min-width:0;}
.e-from{font-size:0.77rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.e-subject{font-size:0.72rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.e-time{font-size:0.65rem;color:var(--text-dim);flex-shrink:0;margin-top:2px;}
.e-tag{font-size:0.59rem;font-weight:600;padding:2px 6px;border-radius:6px;margin-top:4px;display:inline-block;letter-spacing:0.04em;text-transform:uppercase;}
.tag-important{background:rgba(79,110,247,0.15);color:var(--accent2);border:1px solid rgba(79,110,247,0.25);}
.tag-spam{background:rgba(248,113,113,0.12);color:var(--red);border:1px solid rgba(248,113,113,0.22);}
.tag-promo{background:rgba(245,158,11,0.12);color:var(--amber);border:1px solid rgba(245,158,11,0.22);}
.tag-replied{background:rgba(52,211,153,0.1);color:var(--green);border:1px solid rgba(52,211,153,0.2);}

/* TOOLBAR */
.del-toolbar{padding:10px 16px;background:rgba(248,113,113,0.06);border-bottom:1px solid rgba(248,113,113,0.15);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.del-toolbar span{font-size:0.77rem;color:var(--text-muted);flex:1;}
.btn-del{padding:5px 12px;border-radius:6px;border:none;background:var(--red);color:white;font-family:inherit;font-size:0.75rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;}
.sel-drop{padding:5px 8px;border-radius:7px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:inherit;font-size:0.75rem;cursor:pointer;outline:none;}

/* LOGS */
.log-list{max-height:280px;overflow-y:auto;padding:6px 0;}
.log-item{display:flex;align-items:flex-start;gap:10px;padding:7px 16px;font-size:0.73rem;border-bottom:1px solid rgba(99,130,255,0.05);}
.log-item:last-child{border-bottom:none;}
.log-time{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-dim);flex-shrink:0;margin-top:1px;min-width:44px;}
.log-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.log-dot.green{background:var(--green);}
.log-dot.red{background:var(--red);}
.log-dot.amber{background:var(--amber);}
.log-dot.blue{background:var(--accent2);}
.log-text{color:var(--text-muted);flex:1;line-height:1.4;}
.log-text strong{color:var(--text);font-weight:500;}

/* CHART */
.mini-chart{padding:12px 16px 8px;display:flex;align-items:flex-end;gap:5px;height:90px;}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:4px;}
.bar-lbl{font-size:0.57rem;color:var(--text-dim);}

/* AGENT GRID */
.agent-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px 16px;}
.agent-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;}
.ac-title{font-size:0.67rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
.ac-val{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--text);}
.ac-sub{font-size:0.67rem;color:var(--text-dim);margin-top:2px;}

/* ACTIONS */
.action-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.action-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:inherit;font-size:0.77rem;font-weight:500;cursor:pointer;transition:all 0.18s;}
.action-btn:hover{background:var(--surface3);border-color:var(--accent);color:var(--accent2);}
.action-btn svg{width:13px;height:13px;}
.action-btn.primary{background:linear-gradient(135deg,var(--accent),#3d5ce0);border:none;color:white;box-shadow:0 3px 14px rgba(79,110,247,0.3);}
.action-btn.primary:hover{box-shadow:0 4px 20px rgba(79,110,247,0.5);color:white;}
.action-btn.danger{border-color:rgba(248,113,113,0.3);color:var(--red);}
.action-btn.danger:hover{background:rgba(248,113,113,0.1);border-color:var(--red);}
.action-btn.teal{border-color:rgba(45,212,191,0.3);color:var(--teal);}
.action-btn.teal:hover{background:rgba(45,212,191,0.08);border-color:var(--teal);}

/* NOTIFICATIONS PAGE */
.notif-list{padding:8px 0;}
.notif-item-card{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);transition:background 0.15s;cursor:pointer;}
.notif-item-card:hover{background:var(--surface2);}
.notif-item-card:last-child{border-bottom:none;}
.notif-item-card.unread{background:rgba(79,110,247,0.04);}
.notif-dot-indicator{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px;}
.notif-dot-indicator.read{background:transparent;border:1.5px solid var(--border2);}
.notif-icon-wrap{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem;}
.notif-content{flex:1;min-width:0;}
.notif-title{font-size:0.8rem;font-weight:500;color:var(--text);margin-bottom:3px;}
.notif-desc{font-size:0.74rem;color:var(--text-muted);line-height:1.4;}
.notif-time{font-size:0.67rem;color:var(--text-dim);margin-top:4px;}

/* GMAIL */
.gmail-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;text-align:center;margin-bottom:14px;}
.gmail-icon{width:56px;height:56px;margin:0 auto 16px;background:rgba(234,67,53,0.1);border:1px solid rgba(234,67,53,0.2);border-radius:14px;display:flex;align-items:center;justify-content:center;}
.gmail-title{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--text);margin-bottom:8px;}
.gmail-desc{font-size:0.81rem;color:var(--text-muted);line-height:1.6;margin-bottom:20px;max-width:360px;margin-left:auto;margin-right:auto;}
.gmail-btn{display:inline-flex;align-items:center;gap:10px;padding:12px 24px;border-radius:10px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text);font-family:inherit;font-size:0.87rem;font-weight:500;cursor:pointer;transition:all 0.2s;}
.gmail-btn:hover{border-color:var(--accent);background:var(--surface3);}
.gmail-connected{display:flex;align-items:center;gap:10px;padding:14px 18px;background:rgba(52,211,153,0.06);border:1px solid rgba(52,211,153,0.2);border-radius:10px;margin-bottom:14px;}
.gcc-text{flex:1;}
.gcc-title{font-size:0.84rem;font-weight:500;color:var(--text);}
.gcc-sub{font-size:0.73rem;color:var(--text-muted);margin-top:2px;}
.disconnect-btn{padding:6px 12px;border-radius:7px;border:1px solid rgba(248,113,113,0.3);background:none;color:var(--red);font-family:inherit;font-size:0.75rem;cursor:pointer;}

/* SETTINGS */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);margin-bottom:8px;flex-wrap:wrap;gap:10px;}
.sr-label{font-size:0.82rem;color:var(--text);font-weight:500;}
.sr-sub{font-size:0.73rem;color:var(--text-muted);margin-top:2px;}
.toggle-switch{position:relative;width:40px;height:22px;flex-shrink:0;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--border2);border-radius:22px;cursor:pointer;transition:0.3s;}
.toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.3s;}
.toggle-switch input:checked + .toggle-slider{background:var(--teal);}
.toggle-switch input:checked + .toggle-slider::before{transform:translateX(18px);}
.danger-zone{background:rgba(248,113,113,0.04);border:1px solid rgba(248,113,113,0.2);border-radius:12px;padding:18px;}
.dz-title{font-size:0.82rem;font-weight:600;color:var(--red);margin-bottom:6px;}
.dz-desc{font-size:0.77rem;color:var(--text-muted);margin-bottom:14px;line-height:1.5;}
.del-acc-btn{padding:10px 20px;border-radius:8px;border:1.5px solid var(--red);background:none;color:var(--red);font-family:inherit;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
.del-acc-btn:hover{background:var(--red);color:white;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px);}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:380px;width:100%;animation:slideUp 0.3s ease;}
.modal-title{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--text);margin-bottom:10px;}
.modal-desc{font-size:0.81rem;color:var(--text-muted);line-height:1.6;margin-bottom:20px;}
.modal-actions{display:flex;gap:10px;}
.modal-cancel{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:inherit;font-size:0.82rem;cursor:pointer;}
.modal-confirm{flex:1;padding:10px;border-radius:8px;border:none;background:var(--red);color:white;font-family:inherit;font-size:0.82rem;font-weight:600;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface3);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;font-size:0.79rem;color:var(--text);box-shadow:var(--shadow);z-index:1000;animation:toastIn 0.3s cubic-bezier(0.22,1,0.36,1);display:flex;align-items:center;gap:10px;max-width:320px;}
@keyframes toastIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* MOBILE */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);width:220px !important;min-width:220px !important;}
  .sidebar.open{transform:translateX(0);}
  .sidebar.collapsed{transform:translateX(-100%);}
  .sb-close{display:flex !important;align-items:center;justify-content:center;}
  .sidebar.collapsed .logo-text,.sidebar.collapsed .ni-label,.sidebar.collapsed .sb-sec,.sidebar.collapsed .mode-lbl,.sidebar.collapsed .mbtn-lbl,.sidebar.collapsed .u-info,.sidebar.collapsed .lo-lbl,.sidebar.collapsed .nav-badge,.sidebar.collapsed .notif-count{opacity:1 !important;width:auto !important;height:auto !important;}
  .collapse-btn{display:none !important;}
  .hamburger{display:flex !important;}
  .status-pill,.mode-pill{display:none;}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .two-col{grid-template-columns:1fr;}
  .content{padding:10px;}
  .topbar{padding:0 10px;gap:6px;}
  .agent-grid{grid-template-columns:repeat(2,1fr);}
  .toast{bottom:16px;right:16px;left:16px;max-width:100%;}
  .mode-cards{grid-template-columns:1fr;}
  .onboarding-card{padding:24px 18px;}
  .theme-label{display:none;}
}

  const [showDelModal, setShowDelModal] = useState(false);

  useEffect(()=>{ document.documentElement.setAttribute('data-theme',theme); localStorage.setItem('ms_theme',theme); },[theme]);

  const t = (msg,type='green') => setToast({msg,type});
  const toggleSel = id => setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const selAll = () => setSelected(emails.map(e=>e.id));
  const clearSel = () => setSelected([]);
  const selCat = cat => { setDelCat(cat); if(!cat){clearSel();return;} setSelected(emails.filter(e=>e.tag===cat).map(e=>e.id)); };

  const doDelete = () => {
    const n = selected.length;
    setEmails(emails.filter(e=>!selected.includes(e.id)));
    setLogs([{id:Date.now(),time:new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',hour12:false}),dot:'red',text:`Moved <strong>${n} email${n>1?'s':''}</strong> to Bin`},...logs]);
    setSelected([]); setDelCat('');
    t(`${n} email${n>1?'s':''} moved to Bin`,'red');
  };

  const runAgent = () => {
    setLogs([{id:Date.now(),time:new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',hour12:false}),dot:'blue',text:`Agent triggered in <strong>${mode} mode</strong>`},...logs]);
    t(`Agent running in ${mode==='fast'?'⚡ Fast':'🛡️ Safe'} Mode`,mode==='fast'?'amber':'green');
  };

  const changeMode = m => { setMode(m); localStorage.setItem('ms_mode',m); t(m==='fast'?'⚡ Switched to Fast Mode':'🛡️ Switched to Safe Mode',m==='fast'?'amber':'green'); };
  const logout = () => { sessionStorage.clear(); window.location.href='/'; };

  const deleteAccount = async () => {
    const email = sessionStorage.getItem('user_email');
    try {
      const res = await fetch('/api/delete-account',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
      const data = await res.json();
      if(data.success){localStorage.clear();sessionStorage.clear();window.location.href='/';}
      else t(data.error||'Failed to delete account','red');
    } catch { t('Failed to delete account. Please try again.','red'); }
    setShowDelModal(false);
  };

  const sendDraft = id => {
    const d = drafts.find(x=>x.id===id);
    setDrafts(drafts.filter(x=>x.id!==id));
    setLogs([{id:Date.now(),time:new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',hour12:false}),dot:'green',text:`Draft sent to <strong>${d?.name}</strong>`},...logs]);
    t('Reply sent!','green');
  };
  const discardDraft = id => { setDrafts(drafts.filter(x=>x.id!==id)); t('Draft discarded','amber'); };
  const go = p => { setNav(p); setSbOpen(false); };
  const markAllRead = () => setNotifs(notifs.map(n=>({...n,read:true})));

  const imp = emails.filter(e=>e.tag==='important').length;
  const spam = emails.filter(e=>e.tag==='spam').length;
  const promo = emails.filter(e=>e.tag==='promo').length;
  const replied = emails.filter(e=>e.replied).length;
  const maxV = Math.max(...CHART.map(d=>d.i+d.p+d.s));
  const unreadNotifs = notifs.filter(n=>!n.read).length;
  const titles = {dashboard:'Dashboard',inbox:'Inbox',important:'Important',promotions:'Promotions',spam:'Spam',bin:'Bin',logs:'Agent Logs',notifications:'Notifications',gmail:'Gmail',settings:'Settings'};

  if(showOB) return <Onboarding onComplete={m=>{setMode(m);setShowOB(false);}}/>;

  return (
    <div className="layout">
      <div className={`sb-overlay ${sbOpen?'active':''}`} onClick={()=>setSbOpen(false)}/>

      <aside className={`sidebar ${sbOpen?'open':''} ${collapsed?'collapsed':''}`}>
        <div className="sb-logo">
          <div className="logo-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="2" y="5" width="16" height="12" rx="2" stroke="white" strokeWidth="1.8" fill="none"/>
              <path d="M2 8l8 5 8-5" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
              <path d="M19 3l1.5 3L23 7.5 20.5 9 19 12l-1.5-3L15 7.5 17.5 6 19 3z" fill="white" opacity="0.9"/>
            </svg>
          </div>
          <div className="logo-text"><span className="logo-brand">Agentra</span><span className="logo-sub">MailSense</span></div>
          <button className="sb-close" onClick={()=>setSbOpen(false)}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>

        <nav className="sb-nav">
          <span className="sb-sec">Overview</span>
          {[{id:'dashboard',lbl:'Dashboard',icon:Ic.chart},{id:'inbox',lbl:'Inbox',icon:Ic.inbox,badge:imp},{id:'gmail',lbl:'Gmail',icon:Ic.gmail}].map(n=>(
            <button key={n.id} className={`nav-item ${nav===n.id?'active':''}`} onClick={()=>go(n.id)} title={n.lbl}>
              {n.icon}<span className="ni-label">{n.lbl}</span>{n.badge!=null&&<span className="nav-badge">{n.badge}</span>}
            </button>
          ))}

          <span className="sb-sec">Categories</span>
          {[{id:'important',lbl:'Important',icon:Ic.star},{id:'promotions',lbl:'Promotions',icon:Ic.archive,badge:promo,bc:'amber'},{id:'spam',lbl:'Spam',icon:Ic.trash,badge:spam,bc:'red'},{id:'bin',lbl:'Bin',icon:Ic.bin}].map(n=>(
            <button key={n.id} className={`nav-item ${nav===n.id?'active':''}`} onClick={()=>go(n.id)} title={n.lbl}>
              {n.icon}<span className="ni-label">{n.lbl}</span>{n.badge!=null&&<span className={`nav-badge ${n.bc||''}`}>{n.badge}</span>}
            </button>
          ))}

          <span className="sb-sec">System</span>
          {/* NOTIFICATION as nav item */}
          <button className={`nav-item notif-item ${nav==='notifications'?'active':''}`} onClick={()=>go('notifications')} title="Notifications">
            {Ic.bell}
            <span className="ni-label">Notifications</span>
            {unreadNotifs>0&&<span className="notif-count">{unreadNotifs}</span>}
          </button>
          {[{id:'logs',lbl:'Agent Logs',icon:Ic.log},{id:'settings',lbl:'Settings',icon:Ic.settings}].map(n=>(
            <button key={n.id} className={`nav-item ${nav===n.id?'active':''}`} onClick={()=>go(n.id)} title={n.lbl}>
              {n.icon}<span className="ni-label">{n.lbl}</span>
            </button>
          ))}
        </nav>

        <div className="mode-tgl">
          <div className="mode-lbl">Agent Mode</div>
          <div className="mode-btns">
            <button className={`mbtn fast ${mode==='fast'?'active':''}`} onClick={()=>changeMode('fast')} title="Fast Mode">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              <span className="mbtn-lbl">Fast</span>
            </button>
            <button className={`mbtn safe ${mode==='safe'?'active':''}`} onClick={()=>changeMode('safe')} title="Safe Mode">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              <span className="mbtn-lbl">Safe</span>
            </button>
          </div>
        </div>

        <div className="sb-bottom">
          <div className="sb-user">
            <div className="u-avatar">{(sessionStorage.getItem('user_name')||'U')[0].toUpperCase()}</div>
            <div className="u-info"><div className="u-name">{sessionStorage.getItem('user_name')||'User'}</div><div className="u-role">Admin</div></div>
          </div>
          <button className="logout-btn" onClick={logout} title="Logout">
            {Ic.logout}<span className="lo-lbl">Logout</span>
          </button>
        </div>
      </aside>

      <main className="main">
        <div className="topbar">
          <button className="collapse-btn" onClick={()=>setCollapsed(!collapsed)} title={collapsed?'Expand':'Collapse'}>
            {collapsed?Ic.chR:Ic.chL}
          </button>
          <button className="hamburger" onClick={()=>setSbOpen(true)}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div className="topbar-title">{nav==='dashboard'?<><span>MailSense</span> Dashboard</>:titles[nav]}</div>
          <div className="status-pill"><div className="status-dot"/>Agent Active</div>
          <div className={`mode-pill ${mode}`}>
            {mode==='fast'?<><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Fast</>:<><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Safe</>}
          </div>
          {/* PROMINENT THEME TOGGLE */}
          <button className="theme-toggle-btn" onClick={()=>setTheme(x=>x==='dark'?'light':'dark')} title="Toggle theme">
            {theme==='dark'?Ic.sun:Ic.moon}
            <span className="theme-label">{theme==='dark'?'Light':'Dark'}</span>
          </button>
        </div>

        <div className="content">

          {nav==='dashboard'&&<>
            <div className={`mode-banner ${mode}`}>
              <div style={{fontSize:'1.4rem'}}>{mode==='fast'?'⚡':'🛡️'}</div>
              <div>
                <strong>{mode==='fast'?'Fast Mode Active':'Safe Mode Active'}</strong>
                <p>{mode==='fast'?'Replies are being sent automatically to important emails.':'Replies are being saved as drafts. Review them before sending.'}</p>
              </div>
              <button className="action-btn" style={{marginLeft:'auto',fontSize:'0.73rem',padding:'6px 10px'}} onClick={()=>go('settings')}>Change</button>
            </div>
            <div className="stats-grid">
              {[
                {lbl:'Total Emails',val:emails.length,sub:'Fetched today',cls:'blue',icon:Ic.mail},
                {lbl:'Important',val:imp,sub:'Needs attention',cls:'teal',icon:Ic.star},
                {lbl:'Promotions',val:promo,sub:'Auto-archived',cls:'amber',icon:Ic.archive},
                mode==='safe'?{lbl:'Drafts Pending',val:drafts.length,sub:'Awaiting review',cls:'green',icon:Ic.reply}:{lbl:'Auto-Replies',val:replied,sub:'Sent today',cls:'green',icon:Ic.reply},
              ].map((s,i)=>(
                <div key={i} className={`stat-card ${s.cls}`}>
                  <div className="stat-icon">{s.icon}</div>
                  <div className="stat-label">{s.lbl}</div>
                  <div className="stat-value">{s.val}</div>
                  <div className="stat-sub">{s.sub}</div>
                </div>
              ))}
            </div>
            <div className="action-row">
              <button className="action-btn primary" onClick={runAgent}>{Ic.refresh} Run Agent</button>
              <button className="action-btn" onClick={()=>t('Fetching emails…','green')}>{Ic.inbox} Fetch</button>
              {mode==='safe'&&drafts.length>0&&<button className="action-btn teal" onClick={()=>go('inbox')}>{Ic.reply} Review {drafts.length} Drafts</button>}
              <button className="action-btn danger" onClick={()=>{go('inbox');selCat('spam');}}>{Ic.bin} Clear Spam</button>
            </div>
            {mode==='safe'&&drafts.length>0&&(
              <div className="panel">
                <div className="panel-header"><div className="panel-title">🛡️ Drafts Awaiting Review</div><span className="panel-badge">{drafts.length} pending</span></div>
                <div style={{padding:'12px 16px'}}>
                  {drafts.map(d=>(
                    <div key={d.id} className="draft-card">
                      <div className="u-avatar" style={{width:32,height:32,fontSize:'0.73rem',flexShrink:0}}>{d.name[0]}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div className="draft-to">To: {d.name} <span style={{fontSize:'0.69rem',color:'var(--text-dim)'}}>· {d.to}</span></div>
                        <div className="draft-preview">{d.preview}</div>
                        <div className="draft-actions">
                          <button className="draft-send" onClick={()=>sendDraft(d.id)}>Send Reply</button>
                          <button className="draft-discard" onClick={()=>discardDraft(d.id)}>Discard</button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div className="two-col">
              <div className="panel">
                <div className="panel-header"><div className="panel-title">Weekly Activity</div><span className="panel-badge">7 days</span></div>
                <div className="mini-chart" style={{height:120,paddingTop:20}}>
                  {CHART.map((d,i)=>(
                    <div key={i} className="bar-wrap">
                      <div style={{display:'flex',flexDirection:'column',gap:2,flex:1,width:'100%',justifyContent:'flex-end'}}>
                        <div className="bar" style={{height:`${(d.s/maxV)*60}px`,background:'var(--red)',opacity:0.7}}/>
                        <div className="bar" style={{height:`${(d.p/maxV)*60}px`,background:'var(--amber)',opacity:0.8}}/>
                        <div className="bar" style={{height:`${(d.i/maxV)*60}px`,background:'var(--accent)'}}/>
                      </div>
                      <div className="bar-lbl">{d.l}</div>
                    </div>
                  ))}
                </div>
                <div style={{display:'flex',gap:12,padding:'8px 16px 12px',fontSize:'0.67rem',color:'var(--text-muted)'}}>
                  {[['var(--accent)','Important'],['var(--amber)','Promo'],['var(--red)','Spam']].map(([c,l])=>(
                    <div key={l} style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:8,height:8,borderRadius:2,background:c}}/>{l}</div>
                  ))}
                </div>
              </div>
              <div className="panel">
                <div className="panel-header"><div className="panel-title">Agent Stats</div></div>
                <div className="agent-grid">
                  {[
                    {t:mode==='safe'?'Drafts':'Replies',v:mode==='safe'?drafts.length:replied,s:'Today'},
                    {t:'Archived',v:promo+spam,s:'Today'},
                    {t:'Accuracy',v:'98%',s:'Classification'},
                    {t:'Speed',v:'1.2s',s:'Per email'},
                    {t:'Emails',v:emails.length,s:'Total'},
                    {t:'Uptime',v:'99.9%',s:'This week'},
                  ].map((a,i)=>(
                    <div key={i} className="agent-card"><div className="ac-title">{a.t}</div><div className="ac-val">{a.v}</div><div className="ac-sub">{a.s}</div></div>
                  ))}
                </div>
              </div>
            </div>
            <div className="panel">
              <div className="panel-header"><div className="panel-title">Recent Logs</div><span className="panel-badge">Live</span></div>
              <div className="log-list">
                {logs.slice(0,6).map(l=>(
                  <div key={l.id} className="log-item"><span className="log-time">{l.time}</span><div className={`log-dot ${l.dot}`}/><span className="log-text" dangerouslySetInnerHTML={{__html:l.text}}/></div>
                ))}
              </div>
            </div>
          </>}

          {['inbox','important','promotions','spam','bin'].includes(nav)&&<>
            <div className="action-row">
              <button className="action-btn" onClick={selAll}>{Ic.check} Select All</button>
              <button className="action-btn" onClick={clearSel}>Clear</button>
              <select className="sel-drop" value={delCat} onChange={e=>selCat(e.target.value)}>
                <option value="">Category…</option>
                <option value="spam">All Spam</option>
                <option value="promo">All Promos</option>
                <option value="important">All Important</option>
              </select>
              {selected.length>0&&<button className="action-btn danger" onClick={doDelete}>{Ic.bin} Move {selected.length}</button>}
            </div>
            <div className="panel">
              <div className="panel-header">
                <div className="panel-title">{titles[nav]}</div>
                <span className="panel-badge">{nav==='inbox'?emails.length:emails.filter(e=>e.tag===(nav==='promotions'?'promo':nav==='bin'?null:nav)).length} emails</span>
              </div>
              {selected.length>0&&(
                <div className="del-toolbar">
                  <span>{selected.length} selected</span>
                  <button className="btn-del" onClick={doDelete}>{Ic.bin} Move to Bin</button>
                  <button className="action-btn" style={{padding:'5px 10px',fontSize:'0.73rem'}} onClick={clearSel}>Cancel</button>
                </div>
              )}
              <div className="email-list">
                {(nav==='inbox'?emails:emails.filter(e=>e.tag===(nav==='promotions'?'promo':nav==='bin'?null:nav))).filter(Boolean).map(em=>(
                  <div key={em.id} className="email-item">
                    <input type="checkbox" checked={selected.includes(em.id)} onChange={()=>toggleSel(em.id)}/>
                    <div className="e-avatar" style={{background:em.color}}>{em.from[0]}</div>
                    <div className="e-body">
                      <div className="e-from">{em.from}</div>
                      <div className="e-subject">{em.subject}</div>
                      <div style={{display:'flex',gap:6,marginTop:4,flexWrap:'wrap'}}>
                        <span className={`e-tag tag-${em.tag}`}>{em.tag}</span>
                        {em.replied&&<span className="e-tag tag-replied">{mode==='safe'?'draft':'replied'}</span>}
                      </div>
                    </div>
                    <div className="e-time">{em.time}</div>
                  </div>
                ))}
                {nav==='bin'&&<div style={{padding:'32px',textAlign:'center',color:'var(--text-dim)',fontSize:'0.81rem'}}>Bin is empty</div>}
              </div>
            </div>
          </>}

          {nav==='notifications'&&(
            <div className="panel">
              <div className="panel-header">
                <div className="panel-title">Notifications</div>
                <span className="panel-badge">{unreadNotifs} unread</span>
                {unreadNotifs>0&&<button className="action-btn" style={{padding:'4px 10px',fontSize:'0.72rem'}} onClick={markAllRead}>{Ic.check} Mark all read</button>}
              </div>
              <div className="notif-list">
                {notifs.map(n=>(
                  <div key={n.id} className={`notif-item-card ${!n.read?'unread':''}`} onClick={()=>setNotifs(notifs.map(x=>x.id===n.id?{...x,read:true}:x))}>
                    <div className={`notif-dot-indicator ${n.read?'read':''}`}/>
                    <div className="notif-icon-wrap" style={{background:n.bg}}>{n.icon}</div>
                    <div className="notif-content">
                      <div className="notif-title">{n.title}</div>
                      <div className="notif-desc">{n.desc}</div>
                      <div className="notif-time">{n.time}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {nav==='gmail'&&(
            !gmailConn?(
              <div className="gmail-card">
                <div className="gmail-icon">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                    <rect x="2" y="4" width="20" height="16" rx="2" stroke="#EA4335" strokeWidth="1.8" fill="none"/>
                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" stroke="#EA4335" strokeWidth="1.8"/>
                  </svg>
                </div>
                <div className="gmail-title">Connect your Gmail</div>
                <p className="gmail-desc">Connect your Gmail account to let Agentra MailSense read, classify, and reply to your emails automatically.</p>
                <button className="gmail-btn" onClick={()=>{setGmailConn(true);t('Gmail connected! (Demo)','green');}}>
                  <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                  Connect with Google
                </button>
              </div>
            ):(
              <>
                <div className="gmail-connected">
                  <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                  <div className="gcc-text">
                    <div className="gcc-title">Gmail Connected</div>
                    <div className="gcc-sub">{sessionStorage.getItem('user_email')||'your@gmail.com'} · Syncing every 5 minutes</div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 10px',background:'rgba(52,211,153,0.1)',border:'1px solid rgba(52,211,153,0.2)',borderRadius:20,fontSize:'0.7rem',color:'var(--green)',fontWeight:500}}>
                    <div className="status-dot"/>Active
                  </div>
                </div>
                <div className="panel">
                  <div className="panel-header"><div className="panel-title">Gmail Settings</div></div>
                  <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:8}}>
                    {[{l:'Sync frequency',s:'How often to check for new emails',v:'5 minutes'},{l:'Labels to scan',s:'Which Gmail labels to monitor',v:'Inbox'},{l:'Max emails per scan',s:'Number of emails to fetch at once',v:'50'}].map((x,i)=>(
                      <div key={i} className="settings-row">
                        <div><div className="sr-label">{x.l}</div><div className="sr-sub">{x.s}</div></div>
                        <select className="sel-drop" defaultValue={x.v}><option>{x.v}</option></select>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{textAlign:'center',marginTop:8}}>
                  <button className="disconnect-btn" onClick={()=>{setGmailConn(false);t('Gmail disconnected','amber');}}>Disconnect Gmail</button>
                </div>
              </>
            )
          )}

          {nav==='logs'&&(
            <div className="panel">
              <div className="panel-header"><div className="panel-title">Full Agent Log</div><span className="panel-badge">{logs.length} entries</span></div>
              <div className="log-list" style={{maxHeight:'65vh'}}>
                {logs.map(l=>(
                  <div key={l.id} className="log-item"><span className="log-time">{l.time}</span><div className={`log-dot ${l.dot}`}/><span className="log-text" dangerouslySetInnerHTML={{__html:l.text}}/></div>
                ))}
              </div>
            </div>
          )}

          {nav==='settings'&&(
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div className="panel">
                <div className="panel-header"><div className="panel-title">Agent Mode</div></div>
                <div style={{padding:'14px',display:'flex',gap:12,flexWrap:'wrap'}}>
                  {[{id:'fast',icon:'⚡',lbl:'Fast Mode',desc:'Replies sent automatically without review.'},{id:'safe',icon:'🛡️',lbl:'Safe Mode',desc:'Replies saved as Gmail Drafts. You review before sending.'}].map(m=>(
                    <div key={m.id} onClick={()=>changeMode(m.id)} style={{flex:'1 1 160px',padding:'14px',border:`1.5px solid ${mode===m.id?(m.id==='fast'?'var(--amber)':'var(--teal)'):'var(--border)'}`,borderRadius:10,cursor:'pointer',background:mode===m.id?(m.id==='fast'?'rgba(245,158,11,0.06)':'rgba(45,212,191,0.05)'):'var(--surface2)',transition:'all 0.2s'}}>
                      <div style={{fontSize:'1.3rem',marginBottom:8}}>{m.icon}</div>
                      <div style={{fontSize:'0.82rem',fontWeight:600,color:'var(--text)',marginBottom:4}}>{m.lbl}</div>
                      <div style={{fontSize:'0.74rem',color:'var(--text-muted)',lineHeight:1.5}}>{m.desc}</div>
                      {mode===m.id&&<div style={{marginTop:8,fontSize:'0.69rem',fontWeight:600,color:m.id==='fast'?'var(--amber)':'var(--teal)'}}>✓ Currently active</div>}
                    </div>
                  ))}
                </div>
              </div>
              <div className="panel">
                <div className="panel-header"><div className="panel-title">Auto-Reply Settings</div></div>
                <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:8}}>
                  <div className="settings-row">
                    <div><div className="sr-label">Auto-reply to Important emails</div><div className="sr-sub">Send automatic replies to emails tagged as Important</div></div>
                    <label className="toggle-switch"><input type="checkbox" defaultChecked/><span className="toggle-slider"/></label>
                  </div>
                  <div className="settings-row">
                    <div><div className="sr-label">Reply to Promotions</div><div className="sr-sub">Also send replies to promotional emails</div></div>
                    <label className="toggle-switch"><input type="checkbox"/><span className="toggle-slider"/></label>
                  </div>
                  <div style={{padding:'12px',background:'var(--surface2)',borderRadius:8,border:'1px solid var(--border)'}}>
                    <div className="sr-label" style={{marginBottom:8}}>Default reply template</div>
                    <textarea defaultValue="Hi, thank you for your email. I have received your message and will get back to you as soon as possible." style={{width:'100%',padding:'10px 12px',background:'var(--surface)',border:'1px solid var(--border2)',borderRadius:8,color:'var(--text)',fontFamily:'inherit',fontSize:'0.81rem',resize:'vertical',minHeight:76,outline:'none',lineHeight:1.5}}/>
                  </div>
                  <button className="action-btn primary" style={{alignSelf:'flex-start'}} onClick={()=>t('Auto-reply settings saved!','green')}>{Ic.check} Save</button>
                </div>
              </div>
              <div className="panel">
                <div className="panel-header"><div className="panel-title">Auto-Delete Settings</div></div>
                <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:8}}>
                  {[{lbl:'Auto-delete Spam after',v:'7 days'},{lbl:'Auto-delete Promotions after',v:'30 days'},{lbl:'Auto-empty Bin after',v:'30 days'}].map((s,i)=>(
                    <div key={i} className="settings-row">
                      <span className="sr-label">{s.lbl}</span>
                      <select className="sel-drop" defaultValue={s.v}><option>Never</option><option>7 days</option><option>14 days</option><option>30 days</option><option>90 days</option></select>
                    </div>
                  ))}
                  <button className="action-btn primary" style={{alignSelf:'flex-start',marginTop:4}} onClick={()=>t('Settings saved!','green')}>{Ic.check} Save</button>
                </div>
              </div>
              <div className="danger-zone">
                <div className="dz-title">⚠️ Danger Zone</div>
                <div className="dz-desc">Permanently delete your account and all associated data. This cannot be undone. To use Agentra MailSense again, you will need to register a new account.</div>
                <button className="del-acc-btn" onClick={()=>setShowDelModal(true)}>{Ic.del} Delete My Account Permanently</button>
              </div>
            </div>
          )}

        </div>
      </main>

      {showDelModal&&(
        <div className="modal-overlay">
          <div className="modal">
            <div className="modal-title">Delete Account?</div>
            <p className="modal-desc">This will permanently delete your account and all your data. You will be logged out immediately and this action cannot be undone.</p>
            <div className="modal-actions">
              <button className="modal-cancel" onClick={()=>setShowDelModal(false)}>Cancel</button>
              <button className="modal-confirm" onClick={deleteAccount}>Yes, Delete</button>
            </div>
          </div>
        </div>
      )}

      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}
ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
