/* ════════════════════════════════════════════════════════════ */
function App(){
  const userEmail=sessionStorage.getItem('user_email')||'';
  const userName=sessionStorage.getItem('user_name')||'User';

  const [showOB,setShowOB]=useState(localStorage.getItem('ms_onboarded')!=='true');
  const [nav,setNav]=useState('dashboard');
  const [mode,setMode]=useState(localStorage.getItem('ms_mode')||'safe');
  const [emails,setEmails]=useState([]);
  const [logs,setLogs]=useState([]);
  const [stats,setStats]=useState({total:0,important:0,promo:0,spam:0,replied:0});
  const [selected,setSelected]=useState([]);
  const [delCat,setDelCat]=useState('');
  const [toast,setToast]=useState(null);
  const [sbOpen,setSbOpen]=useState(false);
  const [collapsed,setCollapsed]=useState(false);
  const [theme,setTheme]=useState(()=>localStorage.getItem('ms_theme')||'dark');
  const [gmailConn,setGmailConn]=useState(false);
  const [notifs,setNotifs]=useState(NOTIFS);
  const [loading,setLoading]=useState(false);
  const [fetching,setFetching]=useState(false);
  const [dateRange,setDateRange]=useState('7days');
  const [replyTemplate,setReplyTemplate]=useState('Hi,\n\nThank you for your email. I have received your message and will get back to you as soon as possible.\n\nBest regards');
  const [autoDelete,setAutoDelete]=useState(()=>{try{return JSON.parse(localStorage.getItem('ms_autodelete'))||{spam:'7',promo:'30',bin:'30'};}catch{return{spam:'7',promo:'30',bin:'30'};}});
  const [replyModal,setReplyModal]=useState(null);
  const [openEmail,setOpenEmail]=useState(null); // email detail view
  const [showLogoutModal,setShowLogoutModal]=useState(false);
  const [showDelModal,setShowDelModal]=useState(false);
  const [delEmail,setDelEmail]=useState('');
  const [delPw,setDelPw]=useState('');
  const [delErr,setDelErr]=useState('');
  const [delLoading,setDelLoading]=useState(false);
  const [showBulkDelModal,setShowBulkDelModal]=useState(false);
  const [bulkDelCats,setBulkDelCats]=useState({inbox:false,important:false,promotions:false,spam:false,bin:false});
  const [bulkDeleting,setBulkDeleting]=useState(false);

  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('ms_theme',theme);},[theme]);
  useEffect(()=>{
    if(!showOB&&userEmail)loadStatus();
    const p=new URLSearchParams(window.location.search);
    if(p.get('gmail')==='connected'){setGmailConn(true);addLog('green','Gmail connected!');t('Gmail connected! Fetching emails…','green');window.history.replaceState({},'',window.location.pathname);setTimeout(()=>fetchEmails(),1200);}
    else if(p.get('gmail')==='error'){t(`Gmail error: ${p.get('reason')||'unknown'}`,'red');window.history.replaceState({},'',window.location.pathname);}
  },[showOB]);

  const loadStatus=async()=>{
    try{const res=await fetch('/api/gmail-status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:userEmail})});const d=await res.json();if(d.connected){setGmailConn(true);if(d.emails)setEmails(d.emails);if(d.stats)setStats(d.stats);if(d.logs)setLogs(d.logs);}}catch{}
  };

  const addLog=(dot,text)=>{const time=new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',hour12:false});setLogs(l=>[{id:Date.now(),time,dot,text},...l].slice(0,80));};
  const t=(msg,type='green')=>setToast({msg,type});

  const filteredEmails=(filter)=>{
    if(filter==='inbox')return emails.filter(e=>!e.archived&&!e.deleted);
    if(filter==='important')return emails.filter(e=>e.tag==='important'&&!e.archived&&!e.deleted);
    if(filter==='promotions')return emails.filter(e=>e.tag==='promo'&&!e.archived&&!e.deleted);
    if(filter==='spam')return emails.filter(e=>e.tag==='spam'&&!e.deleted);
    if(filter==='bin')return emails.filter(e=>e.deleted);
    return emails;
  };

  const fetchEmails=async()=>{
    if(!gmailConn)return t('Please connect Gmail first','red');
    setFetching(true);addLog('blue',`Fetching emails (${dateRange})…`);
    try{
      const res=await fetch('/api/gmail-fetch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:userEmail,maxEmails:500,dateRange})});
      const d=await res.json();
      if(d.success){
        // Use fresh data directly from response — no stale state
        if(d.emails)setEmails(d.emails);
        if(d.stats)setStats(d.stats);
        addLog('green',`Fetched <strong>${d.fetched}</strong> emails`);
        t(`Fetched ${d.fetched} emails`,'green');
      }else{addLog('red',d.error||'Failed');t(d.error||'Fetch failed','red');}
    }catch{t('Network error','red');}
    setFetching(false);
  };

  const runAgent=async()=>{
    if(!gmailConn)return t('Please connect Gmail first','red');
    setLoading(true);
    addLog('blue',`Agent started — ${mode} mode`);
    t(`Agent running in ${mode==='fast'?'⚡ Fast':'🛡️ Safe'} Mode`,mode==='fast'?'amber':'green');

    // Fetch fresh emails directly from backend — do NOT rely on stale React state
    let freshEmails=[], pendingIds=[];
    try{
      const res=await fetch('/api/gmail-fetch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:userEmail,maxEmails:500,dateRange})});
      const d=await res.json();
      if(d.success){
        addLog('green',`Fetched <strong>${d.fetched}</strong> emails`);
        if(d.emails){setEmails(d.emails);freshEmails=d.emails;}
        if(d.stats)setStats(d.stats);
        if(d.pendingImportant)pendingIds=d.pendingImportant;
      }else{addLog('red',d.error||'Fetch failed');t(d.error||'Fetch failed','red');setLoading(false);return;}
    }catch(e){t('Network error fetching emails','red');setLoading(false);return;}

    if(mode==='safe'){
      // Safe mode: open review modal for first pending email
      const firstPending=freshEmails.find(e=>pendingIds.includes(e.id));
      if(firstPending){setLoading(false);setReplyModal(firstPending);return;}
      t('No pending emails to review','green');
    }else{
      // Fast mode: auto-send replies using fresh pendingIds from server
      if(pendingIds.length===0){t('No new emails need replies','amber');setLoading(false);return;}
      addLog('blue',`Auto-sending replies to <strong>${Math.min(pendingIds.length,10)}</strong> emails…`);
      let sent=0,failed=0;
      for(const emailId of pendingIds.slice(0,10)){
        const em=freshEmails.find(e=>e.id===emailId);
        try{
          const res=await fetch('/api/gmail-reply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userEmail,emailId,mode:'fast',replyTemplate})});
          const d=await res.json();
          if(d.success){sent++;addLog('green',`⚡ Auto-reply sent to <strong>${em?.from||emailId}</strong>`);}
          else{failed++;addLog('amber',`Skipped ${em?.from||emailId}: ${d.message||'already replied'}`);}
        }catch{failed++;addLog('red',`Failed to reply to ${em?.from||emailId}`);}
      }
      t(`Done: ${sent} sent${failed>0?`, ${failed} failed`:''}`,sent>0?'green':'amber');
    }
    setLoading(false);
    await loadStatus();
  };

  const handleSendReply=async(emailId,customReply)=>{
    try{const res=await fetch('/api/gmail-reply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userEmail,emailId,mode:'fast',replyTemplate:customReply})});const d=await res.json();if(d.success){addLog('green','Reply confirmed & sent');t('Reply sent!','green');await loadStatus();}else t(d.error||'Failed','red');}
    catch{t('Network error','red');}
  };

  const doDelete=async(overrideIds)=>{
    const ids=overrideIds||selected;
    const n=ids.length;if(!n)return;
    try{await fetch('/api/gmail-action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userEmail,emailIds:ids,action:'trash'})});setEmails(prev=>prev.map(e=>ids.includes(e.id)?{...e,deleted:true}:e));addLog('red',`Moved <strong>${n}</strong> email${n>1?'s':''} to Bin`);t(`${n} moved to Bin`,'red');}
    catch{t('Failed to delete','red');}
    if(!overrideIds){setSelected([]);setDelCat('');}
  };

  const doBulkDeleteAll=async()=>{
    setBulkDeleting(true);
    const catFilter={inbox:e=>!e.archived&&!e.deleted,important:e=>e.tag==='important'&&!e.archived&&!e.deleted,promotions:e=>e.tag==='promo'&&!e.archived&&!e.deleted,spam:e=>e.tag==='spam'&&!e.deleted,bin:e=>e.deleted};
    const ids=emails.filter(e=>Object.keys(bulkDelCats).some(cat=>bulkDelCats[cat]&&catFilter[cat](e))).map(e=>e.id);
    const n=ids.length;
    if(!n){t('No emails found in selected categories','amber');setBulkDeleting(false);setShowBulkDelModal(false);return;}
    try{
      await fetch('/api/gmail-action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userEmail,emailIds:ids,action:'trash'})});
      setEmails(prev=>prev.map(e=>ids.includes(e.id)?{...e,deleted:true}:e));
      addLog('red',`Bulk deleted <strong>${n}</strong> email${n>1?'s':''} across selected categories`);
      t(`${n} email${n>1?'s':''} deleted`,'red');
    }catch{t('Failed to delete emails','red');}
    setBulkDeleting(false);setShowBulkDelModal(false);setBulkDelCats({inbox:false,important:false,promotions:false,spam:false,bin:false});
  };

  const changeMode=m=>{setMode(m);localStorage.setItem('ms_mode',m);t(m==='fast'?'⚡ Switched to Fast Mode':'🛡️ Switched to Safe Mode',m==='fast'?'amber':'green');};
  const confirmLogout=()=>{sessionStorage.clear();window.location.href='/';};
  const confirmDelete=async()=>{
    setDelErr('');
    if(!delEmail||!delPw){setDelErr('Both fields required.');return;}
    if(delEmail.toLowerCase()!==userEmail.toLowerCase()){setDelErr('Email does not match your account.');return;}
    setDelLoading(true);
    try{const res=await fetch('/api/delete-account',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:delEmail,password:delPw})});const d=await res.json();if(d.success){localStorage.clear();sessionStorage.clear();window.location.href='/';}else setDelErr(d.error||'Failed.');}
    catch{setDelErr('Network error.');}
    setDelLoading(false);
  };
  const connectGmail=()=>{window.location.href=`/api/gmail-auth?email=${encodeURIComponent(userEmail)}`;};
  const disconnectGmail=async()=>{await fetch('/api/gmail-disconnect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:userEmail})});setGmailConn(false);setEmails([]);setStats({total:0,important:0,promo:0,spam:0,replied:0});t('Gmail disconnected','amber');};
  const toggleSel=id=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const selAll=()=>setSelected(filteredEmails(nav).map(e=>e.id));
  const clearSel=()=>setSelected([]);
  const selCat=cat=>{setDelCat(cat);if(!cat){clearSel();return;}setSelected(emails.filter(e=>e.tag===cat).map(e=>e.id));};
  const go=p=>{setNav(p);setSbOpen(false);if(p==='notifications')setNotifs(n=>n.map(x=>({...x,unread:false})));};

  const unread=notifs.filter(n=>n.unread).length;
  const safePending=mode==='safe'?emails.filter(e=>e.tag==='important'&&!e.replied&&!e.deleted).length:0;
  const titles={dashboard:'Dashboard',inbox:'Inbox',important:'Important',promotions:'Promotions',spam:'Spam',bin:'Bin',logs:'Agent Logs',gmail:'Gmail',notifications:'Notifications',settings:'Settings','safe-review':'Review Replies','fast-analyzer':'Reply Analyzer'};

  const NavItem=({id,label,icon,badge,badgeColor,isDot})=>(<button className={`nav-item ${nav===id?'active':''}`} onClick={()=>go(id)} title={label}>{icon}<span className="sb-label">{label}</span>{badge!=null&&!isDot&&<span className={`nav-badge ${badgeColor||''}`}>{badge}</span>}{isDot&&badge>0&&<span className="notif-dot"/>}</button>);

  if(showOB)return <Onboarding onComplete={m=>{setMode(m);setShowOB(false);}}/>;

  return(<div className="layout">
    <div className={`sb-overlay ${sbOpen?'active':''}`} onClick={()=>setSbOpen(false)}/>

    {/* ══ SIDEBAR ══ */}
    <aside className={`sidebar ${sbOpen?'mobile-open':''} ${collapsed?'collapsed':''}`}>
      <div className="sb-logo">
        <div className="logo-icon"><svg viewBox="0 0 24 24" fill="none"><rect x="2" y="5" width="16" height="12" rx="2" stroke="white" strokeWidth="1.8" fill="none"/><path d="M2 8l8 5 8-5" stroke="white" strokeWidth="1.8" strokeLinecap="round"/></svg></div>
        <div className="logo-text sb-label"><span className="logo-brand">Agentra</span><span className="logo-sub">MailSense</span></div>
        <button className="sb-close-btn" onClick={()=>setSbOpen(false)}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>

      <nav className="sb-nav">
        <span className="sb-sec">Overview</span>
        <NavItem id="dashboard" label="Dashboard" icon={I.chart}/>
        <NavItem id="inbox" label="Inbox" icon={I.inbox} badge={stats.important}/>
        <NavItem id="gmail" label="Gmail" icon={I.mail}/>
        <span className="sb-sec">Categories</span>
        <NavItem id="important" label="Important" icon={I.star}/>
        <NavItem id="promotions" label="Promotions" icon={I.archive} badge={stats.promo} badgeColor="amber"/>
        <NavItem id="spam" label="Spam" icon={I.trash} badge={stats.spam} badgeColor="red"/>
        <NavItem id="bin" label="Bin" icon={I.bin}/>
        <span className="sb-sec">{mode==='safe'?'🛡️ Safe Mode':'⚡ Fast Mode'}</span>
        {mode==='safe'
          ?<NavItem id="safe-review" label="Review Replies" icon={I.shield} badge={safePending||undefined}/>
          :<NavItem id="fast-analyzer" label="Reply Analyzer" icon={I.bolt}/>
        }
        <span className="sb-sec">System</span>
        <NavItem id="notifications" label="Notifications" icon={I.bell} badge={unread} isDot={true}/>
        <NavItem id="logs" label="Agent Logs" icon={I.log}/>
        <NavItem id="settings" label="Settings" icon={I.settings}/>
      </nav>

      <div className="mode-tgl">
        <div className="mode-tgl-label">Agent Mode</div>
        <div className="mode-btns">
          <button className={`mbtn fast ${mode==='fast'?'active':''}`} onClick={()=>changeMode('fast')} title="Fast Mode">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            <span className="sb-label">Fast</span>
          </button>
          <button className={`mbtn safe ${mode==='safe'?'active':''}`} onClick={()=>changeMode('safe')} title="Safe Mode">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span className="sb-label">Safe</span>
          </button>
        </div>
      </div>

      <div className="sb-bottom">
        <div className="sb-user">
          <div className="u-avatar">{userName[0].toUpperCase()}</div>
          <div className="u-info sb-label"><div className="u-name">{userName}</div><div className="u-role">{mode==='safe'?'🛡️ Safe Mode':'⚡ Fast Mode'}</div></div>
        </div>
        <button className="logout-btn" onClick={()=>setShowLogoutModal(true)} title="Logout">
          {I.logout}<span className="sb-label">Logout</span>
        </button>
      </div>
    </aside>

    {/* ══ MAIN ══ */}
    <main className="main">
      <div className="topbar">
        <button className="collapse-btn" onClick={()=>setCollapsed(c=>!c)} title={collapsed?'Expand':'Collapse'}>
          {collapsed?I.chR:I.chL}
        </button>
        <button className="hamburger" onClick={()=>setSbOpen(true)}>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div className="topbar-title">{nav==='dashboard'?<><span>MailSense</span> Dashboard</>:titles[nav]}</div>
        <div className="status-pill"><div className="status-dot"/>{gmailConn?'Agent Active':'Not Connected'}</div>
        <div className={`mode-pill ${mode}`}>{mode==='fast'?<>{I.bolt}Fast</>:<>{I.shield}Safe</>}</div>
        <button className="theme-btn" onClick={()=>setTheme(x=>x==='dark'?'light':'dark')}>{theme==='dark'?I.sun:I.moon}<span className="theme-lbl">{theme==='dark'?'Light':'Dark'}</span></button>
      </div>

      <div className="content">

        {/* ══ DASHBOARD ══ */}
        {nav==='dashboard'&&<>
          {!gmailConn&&<div style={{background:'rgba(79,110,247,.06)',border:'1px solid rgba(79,110,247,.2)',borderRadius:9,padding:'12px 14px',marginBottom:12,display:'flex',alignItems:'center',gap:11}}>
            <span style={{fontSize:'1.2rem'}}>📧</span>
            <div style={{flex:1}}><div style={{fontSize:'.8rem',fontWeight:600,color:'var(--text)'}}>Connect your Gmail to get started</div><div style={{fontSize:'.73rem',color:'var(--text-muted)',marginTop:2}}>Emails will be fetched, classified and managed automatically.</div></div>
            <button className="action-btn primary" onClick={()=>go('gmail')}>Connect Gmail →</button>
          </div>}
          <div className={`mode-banner ${mode}`}>
            <div style={{fontSize:'1.3rem'}}>{mode==='fast'?'⚡':'🛡️'}</div>
            <div style={{flex:1}}><strong>{mode==='fast'?'Fast Mode — Fully Automated':'Safe Mode — You Review & Approve'}</strong><p>{mode==='fast'?'AI sends replies automatically.':'AI drafts replies, you confirm before sending.'}</p></div>
            {mode==='safe'&&safePending>0&&<button className="action-btn teal" onClick={()=>go('safe-review')}><span className="notifs-badge">{safePending}</span> Review</button>}
            <button className="action-btn" style={{flexShrink:0,fontSize:'.7rem',padding:'5px 9px'}} onClick={()=>go('settings')}>Change</button>
          </div>
          <div className="stats-grid">
            {[{lbl:'Total',val:stats.total,sub:'In inbox',cls:'blue',icon:I.mail},{lbl:'Important',val:stats.important,sub:'Needs attention',cls:'teal',icon:I.star},{lbl:'Promotions',val:stats.promo,sub:'Auto-archived',cls:'amber',icon:I.archive},{lbl:'Spam',val:stats.spam,sub:'Filtered',cls:'red',icon:I.trash}].map((s,i)=>(
              <div key={i} className={`stat-card ${s.cls}`}><div className="stat-icon">{s.icon}</div><div className="stat-label">{s.lbl}</div><div className="stat-value">{s.val}</div><div className="stat-sub">{s.sub}</div></div>
            ))}
          </div>
          <DateRangeBar value={dateRange} onChange={setDateRange}/>
          <div className="action-row">
            <button className="action-btn primary" onClick={runAgent} disabled={loading||!gmailConn}>{loading?<><span className="spin"/> Running…</>:<>{I.play} Run Agent</>}</button>
            <button className="action-btn" onClick={fetchEmails} disabled={fetching||!gmailConn}>{fetching?<><span className="spin"/> Fetching…</>:<>{I.refresh} Fetch Emails</>}</button>
            {mode==='safe'?<button className="action-btn teal" onClick={()=>go('safe-review')} disabled={!gmailConn}>{I.shield} Review Replies{safePending>0?` (${safePending})`:''}</button>:<button className="action-btn amber" onClick={()=>go('fast-analyzer')} disabled={!gmailConn}>{I.bolt} Analyzer</button>}
            <button className="action-btn danger" onClick={()=>{go('spam');selCat('spam');}}>{I.bin} Clear Spam</button>
          </div>
          <div className="two-col">
            <div className="panel">
              <div className="panel-header"><div className="panel-title">Recent Emails</div><span className="panel-badge">{emails.filter(e=>!e.deleted).length} total</span></div>
              <div className="email-list">
                {emails.filter(e=>!e.deleted).slice(0,6).map(em=>(
                  <div key={em.id} className="email-item" onClick={()=>setOpenEmail(em)}>
                    <div className="e-avatar" style={{background:em.color||'#4f6ef7'}}>{(em.from||'?')[0].toUpperCase()}</div>
                    <div className="e-body"><div className="e-from">{em.from}</div><div className="e-subject">{em.subject||em.snippet}</div>
                    <div className="e-tags"><span className={`e-tag tag-${em.tag}`}>{em.tag}</span>{em.replied&&<span className="e-tag tag-replied">replied</span>}{!em.replied&&em.tag==='important'&&mode==='safe'&&<span className="e-tag tag-draft">needs review</span>}</div></div>
                    <div className="e-time">{em.time}</div>
                  </div>
                ))}
                {emails.length===0&&<div className="empty">{gmailConn?'Click "Fetch Emails" to load your inbox.':'Connect Gmail first.'}</div>}
              </div>
            </div>
            <div className="panel">
              <div className="panel-header"><div className="panel-title">Agent Stats</div></div>
              <div className="agent-grid">
                {[{t:'Emails',v:stats.total,s:'Total'},{t:mode==='safe'?'Confirmed':'Auto-Sent',v:stats.replied,s:'Replies'},{t:'Spam',v:stats.spam,s:'Filtered'},{t:'Promos',v:stats.promo,s:'Archived'},{t:'Mode',v:mode==='fast'?'⚡':'🛡️',s:mode==='fast'?'Fast':'Safe'},{t:'Gmail',v:gmailConn?'✓':'✗',s:gmailConn?'Active':'Offline'}].map((a,i)=>(
                  <div key={i} className="agent-card"><div className="ac-title">{a.t}</div><div className="ac-val">{a.v}</div><div className="ac-sub">{a.s}</div></div>
                ))}
              </div>
            </div>
          </div>
          <div className="panel">
            <div className="panel-header"><div className="panel-title">Agent Logs</div><span className="panel-badge">Live</span></div>
            <div className="log-list">{logs.slice(0,10).map(l=>(<div key={l.id} className="log-item"><span className="log-time">{l.time}</span><div className={`log-dot ${l.dot}`}/><span className="log-text" dangerouslySetInnerHTML={{__html:l.text}}/></div>))}{logs.length===0&&<div className="empty">No logs yet.</div>}</div>
          </div>
        </>}

        {/* ══ SAFE REVIEW ══ */}
        {nav==='safe-review'&&<>
          <div style={{background:'rgba(45,212,191,.06)',border:'1px solid rgba(45,212,191,.2)',borderRadius:9,padding:'12px 14px',marginBottom:12}}>
            <div style={{fontSize:'.8rem',fontWeight:600,color:'var(--teal)',marginBottom:3}}>🛡️ Safe Mode — Reply Review Queue</div>
            <div style={{fontSize:'.73rem',color:'var(--text-muted)'}}>Click an email to generate and review the AI reply before it is sent.</div>
          </div>
          <div className="panel">
            <div className="panel-header"><div className="panel-title">Pending Replies</div><span className="panel-badge">{emails.filter(e=>e.tag==='important'&&!e.replied&&!e.deleted).length} to review</span></div>
            <div className="email-list" style={{maxHeight:'none'}}>
              {emails.filter(e=>e.tag==='important'&&!e.deleted).map(em=>(
                <div key={em.id} className="email-item" onClick={()=>setOpenEmail(em)} style={{cursor:'pointer'}}>
                  <div className="e-avatar" style={{background:em.color||'#4f6ef7'}}>{(em.from||'?')[0].toUpperCase()}</div>
                  <div className="e-body"><div className="e-from">{em.from}</div><div className="e-subject">{em.subject||em.snippet}</div>
                  <div className="e-tags">{em.replied?<span className="e-tag tag-replied">✓ Sent</span>:<span className="e-tag tag-draft">Awaiting Review</span>}</div></div>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
                    <div className="e-time">{em.time}</div>
                    {!em.replied&&<button className="action-btn teal" style={{padding:'3px 9px',fontSize:'.68rem'}} onClick={e=>{e.stopPropagation();setReplyModal(em);}}>Review</button>}
                  </div>
                </div>
              ))}
              {emails.filter(e=>e.tag==='important'&&!e.deleted).length===0&&<div className="empty">{gmailConn?'No important emails.':'Connect Gmail first.'}</div>}
            </div>
          </div>
        </>}

        {/* ══ FAST ANALYZER ══ */}
        {nav==='fast-analyzer'&&<>
          <div style={{background:'rgba(245,158,11,.06)',border:'1px solid rgba(245,158,11,.2)',borderRadius:9,padding:'12px 14px',marginBottom:12}}>
            <div style={{fontSize:'.8rem',fontWeight:600,color:'var(--amber)',marginBottom:3}}>⚡ Fast Mode — Auto-Reply Analyzer</div>
            <div style={{fontSize:'.73rem',color:'var(--text-muted)'}}>Click any email to preview the AI reply that was or will be sent automatically.</div>
          </div>
          <FastAnalyzer emails={emails} userEmail={userEmail} replyTemplate={replyTemplate} t={t}/>
        </>}

        {/* ══ EMAIL LISTS ══ */}
        {['inbox','important','promotions','spam','bin'].includes(nav)&&<>
          <div className="action-row">
            <button className="action-btn" onClick={selAll}>{I.check} Select All</button>
            <button className="action-btn" onClick={clearSel}>Clear</button>
            <select className="sel-drop" value={delCat} onChange={e=>selCat(e.target.value)}>
              <option value="">Category…</option><option value="spam">All Spam</option><option value="promo">All Promos</option><option value="important">All Important</option>
            </select>
            {selected.length>0&&<button className="action-btn danger" onClick={doDelete}>{I.bin} Move {selected.length} to Bin</button>}
          </div>
          <div className="panel">
            <div className="panel-header"><div className="panel-title">{titles[nav]}</div><span className="panel-badge">{filteredEmails(nav).length} emails</span></div>
            {selected.length>0&&<div className="del-toolbar"><span>{selected.length} selected</span><button className="btn-del" onClick={doDelete}>{I.bin} Move to Bin</button><button className="action-btn" style={{padding:'4px 9px',fontSize:'.7rem'}} onClick={clearSel}>Cancel</button></div>}
            <div className="email-list">
              {filteredEmails(nav).map(em=>(
                <div key={em.id} className="email-item" onClick={()=>setOpenEmail(em)}>
                  <input type="checkbox" checked={selected.includes(em.id)} onChange={()=>toggleSel(em.id)} onClick={e=>e.stopPropagation()}/>
                  <div className="e-avatar" style={{background:em.color||'#4f6ef7'}}>{(em.from||'?')[0].toUpperCase()}</div>
                  <div className="e-body"><div className="e-from">{em.from}</div><div className="e-subject">{em.subject||em.snippet}</div>
                  <div className="e-tags"><span className={`e-tag tag-${em.tag}`}>{em.tag}</span>{em.replied&&<span className="e-tag tag-replied">replied</span>}{!em.replied&&em.tag==='important'&&mode==='safe'&&<span className="e-tag tag-draft">review</span>}</div></div>
                  <div className="e-time">{em.time}</div>
                </div>
              ))}
              {filteredEmails(nav).length===0&&<div className="empty">{gmailConn?'No emails here.':'Connect Gmail first.'}</div>}
            </div>
          </div>
        </>}

        {/* ══ NOTIFICATIONS ══ */}
        {nav==='notifications'&&<div className="panel">
          <div className="panel-header"><div className="panel-title">Notifications</div><span className="panel-badge">{notifs.filter(n=>n.unread).length} unread</span><button className="action-btn" style={{padding:'3px 9px',fontSize:'.7rem'}} onClick={()=>setNotifs(n=>n.map(x=>({...x,unread:false})))}>Mark all read</button></div>
          {notifs.map(n=>(<div key={n.id} className={`email-item ${n.unread?'':'read'}`} onClick={()=>setNotifs(p=>p.map(x=>x.id===n.id?{...x,unread:false}:x))}>
            <div style={{width:8,height:8,borderRadius:'50%',background:n.unread?'var(--accent)':'var(--text-dim)',flexShrink:0,marginTop:5}}/>
            <div className="e-body"><div className="e-from">{n.title}</div><div className="e-subject">{n.desc}</div></div>
            <div className="e-time">{n.time}</div>
          </div>))}
        </div>}

        {/* ══ GMAIL ══ */}
        {nav==='gmail'&&(!gmailConn?(
          <div className="gmail-card">
            <div className="gmail-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="2" stroke="#EA4335" strokeWidth="1.8" fill="none"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" stroke="#EA4335" strokeWidth="1.8"/></svg></div>
            <div className="gmail-title">Connect your Gmail</div>
            <p className="gmail-desc">Let Agentra MailSense read, classify, and reply to your emails automatically.</p>
            <button className="gmail-btn" onClick={connectGmail}>
              <svg width="17" height="17" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Connect with Google
            </button>
          </div>
        ):(
          <>
            <div className="gmail-connected">
              <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              <div className="gcc-text"><div className="gcc-title">Gmail Connected</div><div className="gcc-sub">{userEmail}</div></div>
              <div style={{display:'flex',alignItems:'center',gap:5,padding:'3px 9px',background:'rgba(52,211,153,.1)',border:'1px solid rgba(52,211,153,.2)',borderRadius:20,fontSize:'.67rem',color:'var(--green)',fontWeight:500}}><div className="status-dot"/>Active</div>
            </div>
            <DateRangeBar value={dateRange} onChange={setDateRange}/>
            <div className="action-row">
              <button className="action-btn primary" onClick={fetchEmails} disabled={fetching}>{fetching?<><span className="spin"/>Fetching…</>:<>{I.refresh} Fetch Emails</>}</button>
            </div>
            <div style={{textAlign:'center',marginTop:8}}><button className="disconnect-btn" onClick={disconnectGmail}>Disconnect Gmail</button></div>
          </>
        ))}

        {/* ══ LOGS ══ */}
        {nav==='logs'&&<div className="panel">
          <div className="panel-header"><div className="panel-title">Agent Logs</div><span className="panel-badge">{logs.length}</span><button className="action-btn" style={{padding:'3px 9px',fontSize:'.7rem'}} onClick={()=>{setLogs([]);t('Logs cleared','amber');}}>Clear</button></div>
          <div className="log-list" style={{maxHeight:'65vh'}}>{logs.map(l=>(<div key={l.id} className="log-item"><span className="log-time">{l.time}</span><div className={`log-dot ${l.dot}`}/><span className="log-text" dangerouslySetInnerHTML={{__html:l.text}}/></div>))}{logs.length===0&&<div className="empty">No logs yet.</div>}</div>
        </div>}

        {/* ══ SETTINGS ══ */}
        {nav==='settings'&&<div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div className="panel">
            <div className="panel-header"><div className="panel-title">Agent Mode</div></div>
            <div style={{padding:'12px',display:'flex',gap:10,flexWrap:'wrap'}}>
              {[{id:'fast',icon:'⚡',lbl:'Fast Mode',desc:'Sends replies automatically. Use Analyzer to review.'},{id:'safe',icon:'🛡️',lbl:'Safe Mode',desc:'Review and confirm each reply before sending.'}].map(m=>(<div key={m.id} onClick={()=>changeMode(m.id)} style={{flex:'1 1 150px',padding:'13px',border:`1.5px solid ${mode===m.id?(m.id==='fast'?'var(--amber)':'var(--teal)'):'var(--border)'}`,borderRadius:9,cursor:'pointer',background:mode===m.id?(m.id==='fast'?'rgba(245,158,11,.06)':'rgba(45,212,191,.05)'):'var(--surface2)',transition:'all .2s'}}>
                <div style={{fontSize:'1.2rem',marginBottom:7}}>{m.icon}</div>
                <div style={{fontSize:'.8rem',fontWeight:600,color:'var(--text)',marginBottom:3}}>{m.lbl}</div>
                <div style={{fontSize:'.72rem',color:'var(--text-muted)',lineHeight:1.5}}>{m.desc}</div>
                {mode===m.id&&<div style={{marginTop:7,fontSize:'.67rem',fontWeight:600,color:m.id==='fast'?'var(--amber)':'var(--teal)'}}>✓ Active</div>}
              </div>))}
            </div>
          </div>
          <div className="panel">
            <div className="panel-header"><div className="panel-title">Auto-Reply Template</div></div>
            <div style={{padding:'11px 14px',display:'flex',flexDirection:'column',gap:7}}>
              <div style={{padding:'10px',background:'var(--surface2)',borderRadius:7,border:'1px solid var(--border)'}}>
                <div className="sr-label" style={{marginBottom:6}}>Base reply template <span style={{color:'var(--text-dim)',fontWeight:400,textTransform:'none',letterSpacing:0,fontSize:'.68rem'}}>(Mistral AI uses this as starting point)</span></div>
                <textarea value={replyTemplate} onChange={e=>setReplyTemplate(e.target.value)} style={{width:'100%',padding:'9px 11px',background:'var(--surface)',border:'1px solid var(--border2)',borderRadius:7,color:'var(--text)',fontFamily:'inherit',fontSize:'.78rem',resize:'vertical',minHeight:88,outline:'none',lineHeight:1.5}}/>
                <div style={{fontSize:'.7rem',color:'var(--text-dim)',marginTop:5}}>💡 In Safe Mode you can add per-email context when reviewing each reply.</div>
              </div>
              <button className="action-btn primary" style={{alignSelf:'flex-start'}} onClick={()=>t('Template saved!','green')}>{I.check} Save Template</button>
            </div>
          </div>
          <div className="panel">
            <div className="panel-header"><div className="panel-title">Auto-Delete Settings</div></div>
            <div style={{padding:'11px 14px',display:'flex',flexDirection:'column',gap:7}}>
              {[{key:'spam',lbl:'Auto-delete Spam after',sub:'Spam emails will be moved to Bin'},{key:'promo',lbl:'Auto-delete Promotions after',sub:'Promo emails will be moved to Bin'},{key:'bin',lbl:'Auto-empty Bin after',sub:'Bin emails permanently deleted'},{key:'all',lbl:'Auto-delete All Mails after',sub:'All emails across every category will be deleted'}].map(s=>(<div key={s.key} className="settings-row" style={s.key==='all'?{border:'1px solid rgba(239,68,68,.35)',background:'rgba(239,68,68,.04)'}:{}}><div><div className="sr-label" style={s.key==='all'?{color:'#ef4444'}:{}}>{s.lbl}</div><div className="sr-sub">{s.sub}</div></div><select className="sel-drop" value={autoDelete[s.key]||'never'} onChange={e=>setAutoDelete(p=>({...p,[s.key]:e.target.value}))}><option value="never">Never</option><option value="1">1 day</option><option value="3">3 days</option><option value="7">7 days</option><option value="14">14 days</option><option value="30">30 days</option><option value="90">90 days</option></select></div>))}
              <button className="action-btn primary" style={{alignSelf:'flex-start',marginTop:3}} onClick={async()=>{localStorage.setItem('ms_autodelete',JSON.stringify(autoDelete));try{await fetch('/api/save-settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:userEmail,key:'auto_delete',value:autoDelete})});}catch{}t('Auto-delete settings saved!','green');}}>{I.check} Save Settings</button>
            </div>
          </div>
          <div className="panel">
            <div className="panel-header"><div className="panel-title">🗑️ Delete All Mails</div></div>
            <div style={{padding:'11px 14px',display:'flex',flexDirection:'column',gap:7}}>
              <div style={{fontSize:'.78rem',color:'var(--text-muted)',marginBottom:4}}>Instantly move all emails from selected categories to Bin. This cannot be undone.</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:6}}>
                {[{key:'inbox',lbl:'Inbox',color:'var(--teal)'},{key:'important',lbl:'Important',color:'var(--amber)'},{key:'promotions',lbl:'Promotions',color:'#a78bfa'},{key:'spam',lbl:'Spam',color:'#f87171'},{key:'bin',lbl:'Bin (empty)',color:'var(--text-dim)'}].map(c=>(
                  <label key={c.key} onClick={()=>setBulkDelCats(p=>({...p,[c.key]:!p[c.key]}))} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',borderRadius:7,cursor:'pointer',background:bulkDelCats[c.key]?'rgba(239,68,68,.12)':'var(--surface2)',border:`1.5px solid ${bulkDelCats[c.key]?'#ef4444':'var(--border)'}`,transition:'all .15s',userSelect:'none'}}>
                    <span style={{width:14,height:14,borderRadius:3,border:`2px solid ${bulkDelCats[c.key]?'#ef4444':'var(--border2)'}`,background:bulkDelCats[c.key]?'#ef4444':'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.6rem',color:'#fff',flexShrink:0}}>{bulkDelCats[c.key]?'✓':''}</span>
                    <span style={{fontSize:'.75rem',fontWeight:600,color:bulkDelCats[c.key]?'#ef4444':c.color}}>{c.lbl}</span>
                  </label>
                ))}
              </div>
              <button className="action-btn danger" style={{alignSelf:'flex-start'}} onClick={()=>{if(!Object.values(bulkDelCats).some(Boolean)){t('Select at least one category','amber');return;}setShowBulkDelModal(true);}}>🗑️ Delete All Selected</button>
            </div>
          </div>
          <div className="danger-zone">
            <div className="dz-title">⚠️ Danger Zone</div>
            <div className="dz-desc">Permanently delete your account and all data. Verify your identity first. Cannot be undone.</div>
            <button className="del-acc-btn" onClick={()=>{setDelEmail('');setDelPw('');setDelErr('');setShowDelModal(true);}}>{I.del} Delete My Account</button>
          </div>
        </div>}

      </div>{/* end content */}
    </main>

    {/* ══ MODALS ══ */}
    {replyModal&&<ReplyModal email={replyModal} userEmail={userEmail} replyTemplate={replyTemplate} onClose={()=>setReplyModal(null)} onSend={handleSendReply}/>}

    {openEmail&&<EmailDetailModal
      email={openEmail}
      mode={mode}
      userEmail={userEmail}
      onClose={()=>setOpenEmail(null)}
      onReply={em=>{setOpenEmail(null);setReplyModal(em);}}
      onDelete={async(ids)=>{await doDelete(ids);}}
    />}

    {showLogoutModal&&<div className="modal-overlay"><div className="modal" style={{maxWidth:320}}>
      <div className="modal-title">Sign out?</div>
      <p className="modal-desc">You'll return to the sign-in page. Your data and Gmail connection remain intact.</p>
      <div className="modal-actions"><button className="modal-cancel" onClick={()=>setShowLogoutModal(false)}>Cancel</button><button className="modal-confirm accent" onClick={confirmLogout}>Yes, Sign out</button></div>
    </div></div>}

    {showDelModal&&<div className="modal-overlay"><div className="modal" style={{maxWidth:380}}>
      <div className="modal-title">⚠️ Delete Account</div>
      <p className="modal-desc">This is permanent. All emails, logs, and your Gmail connection will be removed. Verify your identity to continue.</p>
      <label className="modal-label">Email address</label>
      <input className="modal-input" type="email" placeholder={userEmail} value={delEmail} onChange={e=>{setDelEmail(e.target.value);setDelErr('');}} autoComplete="off"/>
      <label className="modal-label">Password</label>
      <input className="modal-input" type="password" placeholder="Your password" value={delPw} onChange={e=>{setDelPw(e.target.value);setDelErr('');}}/>
      <div className="modal-error">{delErr}</div>
      <div className="modal-actions"><button className="modal-cancel" onClick={()=>setShowDelModal(false)}>Cancel</button><button className="modal-confirm" onClick={confirmDelete} disabled={delLoading}>{delLoading?<><span className="spin" style={{borderTopColor:'white'}}/> Verifying…</>:'Delete Account'}</button></div>
    </div></div>}

    {showBulkDelModal&&<div className="modal-overlay"><div className="modal" style={{maxWidth:380}}>
      <div className="modal-title">🗑️ Delete All Mails?</div>
      <p className="modal-desc">You are about to move <strong>all emails</strong> from the selected categories to Bin. This action cannot be undone.</p>
      <div style={{background:'var(--surface2)',borderRadius:8,padding:'10px 13px',marginBottom:10,border:'1px solid var(--border)'}}>
        <div style={{fontSize:'.72rem',fontWeight:600,color:'var(--text-muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.04em'}}>Selected categories</div>
        {Object.entries(bulkDelCats).filter(([,v])=>v).map(([k])=>(<div key={k} style={{fontSize:'.8rem',color:'#ef4444',fontWeight:500,marginBottom:3}}>✕ {k.charAt(0).toUpperCase()+k.slice(1)}</div>))}
      </div>
      <div className="modal-actions">
        <button className="modal-cancel" onClick={()=>setShowBulkDelModal(false)} disabled={bulkDeleting}>Cancel</button>
        <button className="modal-confirm" style={{background:'#ef4444'}} onClick={doBulkDeleteAll} disabled={bulkDeleting}>{bulkDeleting?<><span className="spin" style={{borderTopColor:'white'}}/> Deleting…</>:'Yes, Delete All'}</button>
      </div>
    </div></div>}

    {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
  </div>);
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
