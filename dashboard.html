
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agentra MailSense – Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07090f;
  --surface:#0d1117;
  --surface2:#131a26;
  --surface3:#1a2235;
  --border:rgba(99,130,255,0.12);
  --border2:rgba(99,130,255,0.22);
  --accent:#4f6ef7;
  --accent2:#6b88ff;
  --teal:#2dd4bf;
  --teal2:#5eead4;
  --amber:#f59e0b;
  --red:#f87171;
  --green:#34d399;
  --text:#e2e8f8;
  --text-muted:#7a85a8;
  --text-dim:#3a4260;
  --fast:#f59e0b;
  --safe:#2dd4bf;
}
html,body,#root{height:100%;width:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* Layout */
.layout{display:flex;height:100vh;width:100vw;overflow:hidden;}

/* Sidebar */
.sidebar{
  width:220px;min-width:220px;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:0;
  position:relative;
  z-index:10;
}
.sidebar-logo{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.logo-icon{
  width:36px;height:36px;
  background:linear-gradient(135deg,var(--accent),var(--teal));
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 4px 12px rgba(79,110,247,0.35);
}
.logo-icon svg{width:18px;height:18px;}
.logo-text{display:flex;flex-direction:column;line-height:1.1;}
.logo-brand{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--text);}
.logo-sub{font-size:0.6rem;font-weight:600;color:var(--teal);letter-spacing:0.12em;text-transform:uppercase;}

.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;}
.nav-section-label{font-size:0.62rem;font-weight:600;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;padding:10px 10px 4px;}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;
  font-size:0.83rem;font-weight:400;color:var(--text-muted);
  cursor:pointer;transition:all 0.18s ease;
  border:none;background:none;width:100%;text-align:left;
  position:relative;
}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:linear-gradient(135deg,rgba(79,110,247,0.18),rgba(45,212,191,0.08));color:var(--text);font-weight:500;}
.nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;background:linear-gradient(var(--accent),var(--teal));border-radius:2px;}
.nav-item svg{width:15px;height:15px;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--accent);color:white;font-size:0.62rem;font-weight:600;padding:1px 6px;border-radius:20px;}
.nav-badge.red{background:var(--red);}
.nav-badge.amber{background:var(--amber);}

/* Mode toggle in sidebar */
.mode-toggle{
  margin:10px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
}
.mode-label{font-size:0.65rem;font-weight:600;color:var(--text-dim);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;}
.mode-buttons{display:flex;gap:6px;}
.mode-btn{
  flex:1;padding:7px 6px;border:none;border-radius:7px;
  font-family:inherit;font-size:0.75rem;font-weight:500;
  cursor:pointer;transition:all 0.2s ease;
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.mode-btn.fast{background:rgba(245,158,11,0.12);color:var(--amber);border:1px solid rgba(245,158,11,0.2);}
.mode-btn.fast.active{background:var(--amber);color:#000;box-shadow:0 2px 10px rgba(245,158,11,0.4);}
.mode-btn.safe{background:rgba(45,212,191,0.08);color:var(--teal);border:1px solid rgba(45,212,191,0.18);}
.mode-btn.safe.active{background:var(--teal);color:#000;box-shadow:0 2px 10px rgba(45,212,191,0.4);}

.sidebar-user{
  padding:12px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.user-avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--teal));
  display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;font-weight:600;color:white;flex-shrink:0;
}
.user-info{flex:1;min-width:0;}
.user-name{font-size:0.8rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{font-size:0.65rem;color:var(--text-muted);}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* Topbar */
.topbar{
  height:56px;min-height:56px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 24px;gap:16px;
}
.topbar-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--text);flex:1;}
.topbar-title span{font-style:italic;background:linear-gradient(90deg,var(--accent2),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.status-pill{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;
  font-size:0.72rem;font-weight:500;
  background:rgba(52,211,153,0.1);
  border:1px solid rgba(52,211,153,0.25);
  color:var(--green);
}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.mode-pill{
  display:flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:20px;
  font-size:0.72rem;font-weight:600;
}
.mode-pill.fast{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);color:var(--amber);}
.mode-pill.safe{background:rgba(45,212,191,0.1);border:1px solid rgba(45,212,191,0.25);color:var(--teal);}

/* Content */
.content{flex:1;overflow-y:auto;padding:24px;}

/* Stats row */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:18px 20px;
  position:relative;
  overflow:hidden;
  transition:border-color 0.2s;
}
.stat-card:hover{border-color:var(--border2);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.blue::before{background:linear-gradient(90deg,var(--accent),var(--accent2));}
.stat-card.teal::before{background:linear-gradient(90deg,var(--teal),var(--teal2));}
.stat-card.amber::before{background:var(--amber);}
.stat-card.red::before{background:var(--red);}
.stat-label{font-size:0.72rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}
.stat-value{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--text);line-height:1;}
.stat-sub{font-size:0.72rem;color:var(--text-muted);margin-top:6px;}
.stat-icon{position:absolute;right:16px;top:16px;opacity:0.08;}
.stat-icon svg{width:40px;height:40px;}

/* Two column */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
.three-col{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:24px;}

/* Panel */
.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
}
.panel-header{
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.panel-title{font-size:0.85rem;font-weight:600;color:var(--text);flex:1;}
.panel-badge{font-size:0.68rem;font-weight:500;padding:2px 8px;border-radius:10px;background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}

/* Email list */
.email-list{max-height:320px;overflow-y:auto;}
.email-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 18px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background 0.15s;
  position:relative;
}
.email-item:last-child{border-bottom:none;}
.email-item:hover{background:var(--surface2);}
.email-item input[type=checkbox]{
  margin-top:2px;flex-shrink:0;
  accent-color:var(--accent);
  width:14px;height:14px;cursor:pointer;
}
.email-avatar{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:0.7rem;font-weight:600;flex-shrink:0;color:white;
}
.email-body{flex:1;min-width:0;}
.email-from{font-size:0.8rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.email-subject{font-size:0.76rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.email-time{font-size:0.68rem;color:var(--text-dim);flex-shrink:0;margin-top:2px;}
.email-tag{
  font-size:0.62rem;font-weight:600;padding:2px 7px;border-radius:8px;
  margin-top:4px;display:inline-block;letter-spacing:0.04em;text-transform:uppercase;
}
.tag-important{background:rgba(79,110,247,0.15);color:var(--accent2);border:1px solid rgba(79,110,247,0.25);}
.tag-spam{background:rgba(248,113,113,0.12);color:var(--red);border:1px solid rgba(248,113,113,0.22);}
.tag-promo{background:rgba(245,158,11,0.12);color:var(--amber);border:1px solid rgba(245,158,11,0.22);}
.tag-replied{background:rgba(52,211,153,0.1);color:var(--green);border:1px solid rgba(52,211,153,0.2);}

/* Delete toolbar */
.delete-toolbar{
  padding:10px 18px;
  background:rgba(248,113,113,0.06);
  border-bottom:1px solid rgba(248,113,113,0.15);
  display:flex;align-items:center;gap:10px;
  animation:slideDown 0.2s ease;
}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.delete-toolbar span{font-size:0.8rem;color:var(--text-muted);flex:1;}
.btn-delete{
  padding:6px 14px;border-radius:7px;border:none;
  background:var(--red);color:white;
  font-family:inherit;font-size:0.78rem;font-weight:500;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:opacity 0.15s,box-shadow 0.15s;
}
.btn-delete:hover{opacity:0.85;box-shadow:0 2px 10px rgba(248,113,113,0.35);}
.select-dropdown{
  padding:5px 10px;border-radius:7px;
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);font-family:inherit;font-size:0.78rem;
  cursor:pointer;outline:none;
}

/* Log list */
.log-list{max-height:280px;overflow-y:auto;padding:8px 0;}
.log-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:8px 18px;
  font-size:0.76rem;
  border-bottom:1px solid rgba(99,130,255,0.05);
}
.log-item:last-child{border-bottom:none;}
.log-time{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--text-dim);flex-shrink:0;margin-top:1px;min-width:44px;}
.log-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.log-dot.green{background:var(--green);}
.log-dot.red{background:var(--red);}
.log-dot.amber{background:var(--amber);}
.log-dot.blue{background:var(--accent2);}
.log-text{color:var(--text-muted);flex:1;line-height:1.4;}
.log-text strong{color:var(--text);font-weight:500;}

/* Chart bars */
.mini-chart{padding:14px 18px 10px;display:flex;align-items:flex-end;gap:5px;height:90px;}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:100%;border-radius:3px 3px 0 0;transition:height 0.3s ease;min-height:4px;}
.bar-label{font-size:0.6rem;color:var(--text-dim);}

/* Action buttons row */
.action-row{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
.action-btn{
  display:flex;align-items:center;gap:7px;
  padding:9px 16px;border-radius:9px;
  border:1px solid var(--border2);
  background:var(--surface2);
  color:var(--text);
  font-family:inherit;font-size:0.8rem;font-weight:500;
  cursor:pointer;transition:all 0.18s;
}
.action-btn:hover{background:var(--surface3);border-color:var(--accent);color:var(--accent2);}
.action-btn svg{width:14px;height:14px;}
.action-btn.primary{background:linear-gradient(135deg,var(--accent),#3d5ce0);border:none;color:white;box-shadow:0 3px 14px rgba(79,110,247,0.3);}
.action-btn.primary:hover{box-shadow:0 4px 20px rgba(79,110,247,0.5);color:white;}
.action-btn.danger{border-color:rgba(248,113,113,0.3);color:var(--red);}
.action-btn.danger:hover{background:rgba(248,113,113,0.1);border-color:var(--red);}

/* Toast */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--surface3);border:1px solid var(--border2);
  border-radius:10px;padding:12px 18px;
  font-size:0.82rem;color:var(--text);
  box-shadow:0 8px 30px rgba(0,0,0,0.5);
  z-index:1000;
  animation:toastIn 0.3s cubic-bezier(0.22,1,0.36,1);
  display:flex;align-items:center;gap:10px;
  max-width:320px;
}
@keyframes toastIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.toast-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.toast-icon.green{background:rgba(52,211,153,0.2);}
.toast-icon.red{background:rgba(248,113,113,0.2);}
.toast-icon.amber{background:rgba(245,158,11,0.2);}

/* Agent status cards */
.agent-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 18px;}
.agent-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;}
.agent-card-title{font-size:0.72rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.agent-card-value{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--text);}
.agent-card-sub{font-size:0.7rem;color:var(--text-dim);margin-top:3px;}

/* Scrollable content fix */
.content-inner{min-width:900px;}
</style>
</head>

// ── Toast Component ──
function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const colors = { green: '#34d399', red: '#f87171', amber: '#f59e0b' };
  return (
    <div className="toast">
      <div className="toast-icon" style={{background: `${colors[type]}22`}}>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={colors[type]} strokeWidth="3">
          {type==='green' ? <polyline points="20 6 9 17 4 12"/> : type==='red' ? <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></> : <><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>}
        </svg>
      </div>
      <span>{msg}</span>
    </div>
  );
}

            {activeNav === 'users' && (
              <div className="panel">
                <div className="panel-header"><div className="panel-title">Team Members</div><span className="panel-badge">3 users</span></div>
                <div style={{padding:'8px 0'}}>
                  {[
                    { name:'Pooja', email:'pooja@agentra.ai', role:'Admin',    avatar:'PO', color:'#4f6ef7' },
                    { name:'Rahul', email:'rahul@agentra.ai', role:'User',     avatar:'RA', color:'#2dd4bf' },
                    { name:'Sneha', email:'sneha@agentra.ai', role:'Observer', avatar:'SN', color:'#f59e0b' },
                  ].map((u,i)=>(
                    <div key={i} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 18px',borderBottom:'1px solid var(--border)'}}>
                      <div className="user-avatar" style={{background:u.color,width:36,height:36,fontSize:'0.8rem'}}>{u.avatar}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:'0.85rem',fontWeight:500,color:'var(--text)'}}>{u.name}</div>
                        <div style={{fontSize:'0.74rem',color:'var(--text-muted)'}}>{u.email}</div>
                      </div>
                      <span style={{fontSize:'0.72rem',fontWeight:600,padding:'3px 10px',borderRadius:20,
                        background:u.role==='Admin'?'rgba(79,110,247,0.15)':u.role==='User'?'rgba(45,212,191,0.1)':'rgba(245,158,11,0.1)',
                        color:u.role==='Admin'?'var(--accent2)':u.role==='User'?'var(--teal)':'var(--amber)',
                        border:`1px solid ${u.role==='Admin'?'rgba(79,110,247,0.25)':u.role==='User'?'rgba(45,212,191,0.2)':'rgba(245,158,11,0.2)'}`
                      }}>{u.role}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

          </div>
        </div>
      </main>

      {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
